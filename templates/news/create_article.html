{% extends "base.html" %}

{% block title %}Create Article{% endblock %}

{% block content %}
<h2>Create Article</h2>

<p>Logged in as: {{ request.user.username }} ({{ request.user.role }})</p>

<form method="post">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <button type="submit">Submit Article</button>
</form>

<p><a href="{% url 'journalist_dashboard' %}">Back to Dashboard</a></p>
{% endblock %}
